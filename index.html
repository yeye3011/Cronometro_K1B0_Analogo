<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cronometro k1B0</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <section class="timer-grid" id="timerGrid"></section>
  </main>

  <template id="timerTemplate">
    <article class="timer-card">
      <div class="timer-section">

        <div class="section-label">K1B0 <span class="section-number"></span></div>

        <div class="timer-box">
          <div class="time-display">05:00</div>

          <div class="controls">
            <button class="btn btn-start" type="button">Iniciar</button>
            <button class="btn btn-pause" type="button" disabled>Pausar</button>
            <button class="btn btn-reset" type="button">Reiniciar</button>
          </div>

          <label class="time-adjuster">
            <span>Escoger tiempo:</span>
            <input class="minutes-input" type="number" min="1" max="60" value="5" />
          </label>
        </div>

        <div class="lives" aria-label="Vidas restantes"></div>

      </div>
    </article>
  </template>

  <script src="script.js"></script>
</body>
</html>
